<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="utility-page">
  <section class="card utility-card">
    <h1>Email Verification</h1>
    <p id="verifyStatus">Checking your verification token...</p>
    <a href="/">Return to dashboard</a>
  </section>
  <script>
    const params = new URLSearchParams(globalThis.location.search);
    const token = params.get('token');
    const status = document.getElementById('verifyStatus');

    if (token) {
      fetch(`/auth/verify-email?token=${encodeURIComponent(token)}`)
        .then(async (response) => {
          const payload = await response.json();
          status.textContent = payload.message || 'Verification complete.';
        })
        .catch((error) => {
          console.error('Email verification request failed:', error);
          status.textContent = 'Unable to verify your email right now.';
        });
    } else {
      status.textContent = 'Verification token missing.';
    }
  </script>
</body>
</html>
