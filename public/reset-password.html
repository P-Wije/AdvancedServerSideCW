<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="utility-page">
  <section class="card utility-card">
    <h1>Reset Password</h1>
    <form id="resetPasswordForm" class="stack">
      <input type="password" name="password" placeholder="New strong password" required />
      <button type="submit">Reset Password</button>
    </form>
    <p id="resetStatus">Enter your new password.</p>
    <a href="/">Return to dashboard</a>
  </section>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const form = document.getElementById('resetPasswordForm');
    const status = document.getElementById('resetStatus');
    let csrfToken = '';

    fetch('/auth/session')
      .then((response) => response.json())
      .then((data) => {
        csrfToken = data.csrfToken || '';
      });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const password = form.password.value;
      const response = await fetch('/auth/reset-password', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-csrf-token': csrfToken,
        },
        body: JSON.stringify({ token, password }),
      });
      const payload = await response.json();
      status.textContent = payload.message || 'Password reset request complete.';
    });
  </script>
</body>
</html>
